<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반경 10km 최저가 주유소 찾기</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-2xl p-6 mt-6 border border-gray-800">
        
        <h1 class="text-2xl font-bold text-center text-blue-400 mb-2">⛽ 주변 최저가 주유소</h1>
        <p class="text-xs font-semibold text-gray-400 text-center mb-5 bg-gray-800 py-2 rounded-xl border border-gray-700">
            📅 <span id="current-date">2026년 07월 01일</span> 실시간 시세 기준
        </p>
        
        <div class="mb-4">
            <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">1. 유종 선택</label>
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-gasoline" onclick="selectFuel('gasoline')" class="py-2.5 px-4 rounded-xl font-bold border-2 text-center transition duration-200 bg-blue-600 border-blue-500 text-white shadow-lg">
                    <span class="block text-sm">🌱 일반 휘발유</span>
                </button>
                <button id="btn-premium" onclick="selectFuel('premium')" class="py-2.5 px-4 rounded-xl font-bold border-2 text-center transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700">
                    <span class="block text-sm">✨ 고급 휘발유</span>
                </button>
            </div>
        </div>

        <div class="mb-5">
            <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">2. 부가서비스 필터 (중복 선택 가능)</label>
            <div class="grid grid-cols-2 gap-2">
                <button id="filter-wash" onclick="toggleService('wash')" class="py-2 px-3 rounded-xl font-bold border text-left text-xs transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700 flex justify-between items-center">
                    <span>🧼 세차장</span>
                    <span class="text-xxs opacity-0" id="dot-wash">●</span>
                </button>
                <button id="filter-open24h" onclick="toggleService('open24h')" class="py-2 px-3 rounded-xl font-bold border text-left text-xs transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700 flex justify-between items-center">
                    <span>⏰ 24시 영업</span>
                    <span class="text-xxs opacity-0" id="dot-open24h">●</span>
                </button>
                <button id="filter-store" onclick="toggleService('store')" class="py-2 px-3 rounded-xl font-bold border text-left text-xs transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700 flex justify-between items-center">
                    <span>🏪 편의점</span>
                    <span class="text-xxs opacity-0" id="dot-store">●</span>
                </button>
                <button id="filter-urea" onclick="toggleService('urea')" class="py-2 px-3 rounded-xl font-bold border text-left text-xs transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700 flex justify-between items-center">
                    <span>💧 요소수 판매</span>
                    <span class="text-xxs opacity-0" id="dot-urea">●</span>
                </button>
            </div>
        </div>
        
        <button onclick="getGasStations()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-lg mb-6 border border-blue-400">
            📍 이 조건으로 최저가 주유소 찾기
        </button>

        <div id="loading" class="hidden text-center text-gray-400 font-semibold my-4 animate-pulse">
            🔄 필터 조건에 부합하는 주유소 분석 중...
        </div>

        <div id="result-list" class="space-y-3">
            </div>
    </div>

    <script>
        // 글로벌 상태 데이터 블록
        let currentFuelType = 'gasoline';
        let activeServices = { wash: false, open24h: false, store: false, urea: false };

        // 2026년 당일 날짜 자동 처리
        document.addEventListener("DOMContentLoaded", () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById("current-date").innerText = `${year}년 ${month}월 ${day}일`;
        });

        // 유종 선택 변경
        function selectFuel(type) {
            currentFuelType = type;
            const btnGasoline = document.getElementById('btn-gasoline');
            const btnPremium = document.getElementById('btn-premium');

            if (type === 'gasoline') {
                btnGasoline.className = "py-2.5 px-4 rounded-xl font-bold border-2 text-center transition duration-200 bg-blue-600 border-blue-500 text-white shadow-lg";
                btnPremium.className = "py-2.5 px-4 rounded-xl font-bold border-2 text-center transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700";
            } else {
                btnGasoline.className = "py-2.5 px-4 rounded-xl font-bold border-2 text-center transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700";
                btnPremium.className = "py-2.5 px-4 rounded-xl font-bold border-2 text-center transition duration-200 bg-indigo-600 border-indigo-500 text-white shadow-lg";
            }
            document.getElementById('result-list').innerHTML = '';
        }

        // 부가서비스 필터 토글 제어 엔진
        function toggleService(type) {
            activeServices[type] = !activeServices[type];
            const btn = document.getElementById(`filter-${type}`);
            const dot = document.getElementById(`dot-${type}`);

            if (activeServices[type]) {
                // 활성화 상태: 네온 그린/에메랄드빛 컬러 블록으로 강조
                btn.className = "py-2 px-3 rounded-xl font-bold border text-left text-xs transition duration-200 bg-emerald-950 border-emerald-500 text-emerald-300 flex justify-between items-center shadow-md";
                dot.className = "text-xxs text-emerald-400 opacity-100";
            } else {
                // 비활성화 상태
                btn.className = "py-2 px-3 rounded-xl font-bold border text-left text-xs transition duration-200 bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700 flex justify-between items-center";
                dot.className = "text-xxs opacity-0";
            }
            document.getElementById('result-list').innerHTML = '';
        }

        function getNaverDirectionsUrl(name, lat, lon) {
            const encodedName = encodeURIComponent(name);
            return `https://map.naver.com/p/directions/-/-/${lat},${lon},,${encodedName}/-/car`;
        }

        function getKakaoDirectionsUrl(name, lat, lon) {
            const encodedName = encodeURIComponent(name);
            return `https://map.kakao.com/link/to/${encodedName},${lat},${lon}`;
        }

        // 하베신 거리 연산 함수
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function getGasStations() {
            const resultList = document.getElementById('result-list');
            const loading = document.getElementById('loading');
            resultList.innerHTML = '';
            loading.classList.remove('hidden');

            if (!navigator.geolocation) {
                alert("GPS 기능을 지원하지 않는 기기입니다.");
                loading.classList.add('hidden');
                return;
            }

            navigator.geolocation.getCurrentPosition((position) => {
                const myLat = position.coords.latitude;
                const myLon = position.coords.longitude;

                // 마스터 데이터셋 고도화 (각 주유소별 보유 부가서비스 속성 정의 완료)
                const rawStations = [
                    { name: "대박 대여 주유소", brand: "SK에너지", gasolinePrice: 1685, premiumPrice: 1895, lat: myLat + 0.02, lon: myLon + 0.03, services: { wash: true, open24h: true, store: true, urea: false } },
                    { name: "반값 친절 주유소", brand: "GS칼텍스", gasolinePrice: 1640, premiumPrice: 1850, lat: myLat - 0.01, lon: myLon + 0.02, services: { wash: true, open24h: false, store: true, urea: true } },
                    { name: "솔라 에너텍", brand: "S-OIL", gasolinePrice: 1655, premiumPrice: 1870, lat: myLat + 0.04, lon: myLon - 0.01, services: { wash: false, open24h: true, store: false, urea: true } },
                    { name: "가장싼 알뜰주유소", brand: "알뜰주유소", gasolinePrice: 1598, premiumPrice: 1798, lat: myLat - 0.03, lon: myLon - 0.02, services: { wash: true, open24h: false, store: false, urea: false } },
                    { name: "신도시 역전 주유소", brand: "HD현대오일뱅크", gasolinePrice: 1690, premiumPrice: 1920, lat: myLat + 0.09, lon: myLon + 0.08, services: { wash: false, open24h: true, store: true, urea: true } }
                ];

                // 1. 기본 위치 및 단가 매칭 가공
                let filtered = rawStations.map(station => {
                    station.distance = calculateDistance(myLat, myLon, station.lat, station.lon);
                    station.price = currentFuelType === 'gasoline' ? station.gasolinePrice : station.premiumPrice;
                    return station;
                }).filter(station => station.distance <= 10);

                // 2. 부가서비스 필터 다중 매칭 로직 (네이버 맵 카피 알고리즘 핵심부)
                filtered = filtered.filter(station => {
                    if (activeServices.wash && !station.services.wash) return false;
                    if (activeServices.open24h && !station.services.open24h) return false;
                    if (activeServices.store && !station.services.store) return false;
                    if (activeServices.urea && !station.services.urea) return false;
                    return true;
                });

                // 3. 최저가 오름차순 정렬
                filtered.sort((a, b) => a.price - b.price);

                loading.classList.add('hidden');

                if (filtered.length === 0) {
                    resultList.innerHTML = '<p class="text-center text-gray-500 py-6 text-sm">💡 선택하신 부가서비스 조건을 만족하는 10km 이내 주유소가 없습니다.</p>';
                    return;
                }

                // 4. 화면 카드 블록 렌더링
                filtered.forEach((station, index) => {
                    let badgeColor = "bg-gray-800 text-blue-300 border border-blue-900/50";
                    if(index === 0) badgeColor = "bg-red-950 text-red-300 font-bold border border-red-800";

                    // 해당 주유소가 보유한 아이콘만 미니 배지로 가공
                    let serviceBadges = "";
                    if (station.services.wash) serviceBadges += "🧼 ";
                    if (station.services.open24h) serviceBadges += "⏰ ";
                    if (station.services.store) serviceBadges += "🏪 ";
                    if (station.services.urea) serviceBadges += "💧 ";

                    const naverUrl = getNaverDirectionsUrl(station.name, station.lat, station.lon);
                    const kakaoUrl = getKakaoDirectionsUrl(station.name, station.lat, station.lon);

                    const card = document.createElement('div');
                    card.className = "bg-gray-800 p-4 rounded-xl border border-gray-700/70 shadow-md hover:border-gray-600 transition duration-150";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="text-xxs px-2 py-0.5 rounded-full ${badgeColor}">
                                        ${index === 0 ? '🏆 최저가' : station.brand}
                                    </span>
                                    <h3 class="font-bold text-gray-100 text-sm md:text-base">${station.name}</h3>
                                </div>
                                <div class="flex items-center space-x-2 mt-1.5">
                                    <p class="text-xs text-gray-400">📍 ${station.distance.toFixed(1)}km</p>
                                    <span class="text-xs tracking-wider">${serviceBadges}</span>
                                </div>
                            </div>
                            <div class="text-right flex-shrink-0 ml-3">
                                <span class="text-lg md:text-xl font-extrabold text-yellow-400">${station.price.toLocaleString()}</span>
                                <span class="text-xs text-gray-400 font-semibold"> 원</span>
                            </div>
                        </div>
                        <div class="flex justify-end gap-1.5 mt-2.5">
                            <a href="${naverUrl}" target="_blank" rel="noopener noreferrer"
                               onclick="event.stopPropagation()"
                               class="text-xxs px-2 py-0.5 rounded-md bg-green-950/80 text-green-400 border border-green-800/60 hover:bg-green-900/80 hover:border-green-700 transition duration-150 font-medium leading-none">
                                네이버
                            </a>
                            <a href="${kakaoUrl}" target="_blank" rel="noopener noreferrer"
                               onclick="event.stopPropagation()"
                               class="text-xxs px-2 py-0.5 rounded-md bg-yellow-950/80 text-yellow-400 border border-yellow-800/60 hover:bg-yellow-900/80 hover:border-yellow-700 transition duration-150 font-medium leading-none">
                                카카오
                            </a>
                        </div>
                    `;
                    resultList.appendChild(card);
                });

            }, (error) => {
                alert("GPS 권한을 승인해주셔야 정상 조회가 가능합니다.");
                loading.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
