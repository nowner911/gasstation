<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 최저가 주유소</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-100 min-h-screen font-sans p-5 flex flex-col items-center">

    <div class="w-full max-w-md bg-zinc-900 rounded-3xl shadow-2xl p-6 mt-4 border border-zinc-800">
        <!-- 헤더 및 실시간 날짜 -->
        <h1 class="text-3xl font-black text-white tracking-tight mb-1">⛽ 실시간 최저가 주유소</h1>
        <div id="today-date" class="text-zinc-400 text-sm font-bold mb-6 bg-zinc-800/50 py-2.5 rounded-xl text-center border border-zinc-800">
            로딩 중...
        </div>

        <!-- 1. 유종 선택 -->
        <div class="mb-6">
            <label class="block text-sm font-black text-zinc-400 mb-2.5">1. 유종 선택</label>
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-gasoline" onclick="setFuel('gasoline')" class="py-3.5 px-4 rounded-2xl font-black text-base border-2 text-center transition bg-blue-600 border-blue-500 text-white shadow-xl">
                    🌱 일반 휘발유
                </button>
                <button id="btn-premium" onclick="setFuel('premium')" class="py-3.5 px-4 rounded-2xl font-black text-base border-2 text-center transition bg-zinc-800 border-zinc-700 text-zinc-400 hover:bg-zinc-700">
                    ✨ 고급 휘발유
                </button>
            </div>
        </div>

        <!-- 2. 부가서비스 필터 -->
        <div class="mb-6">
            <label class="block text-sm font-black text-zinc-400 mb-2.5">2. 부가서비스 필터 (중복 선택)</label>
            <div class="grid grid-cols-2 gap-2.5">
                <button id="filter-wash" onclick="toggleService('wash')" class="py-3 px-4 rounded-xl font-bold border text-left text-sm transition bg-zinc-800 border-zinc-700 text-zinc-300 flex justify-between items-center">
                    <span>🧼 세차장</span><span class="text-xs opacity-0" id="dot-wash">●</span>
                </button>
                <button id="filter-open24h" onclick="toggleService('open24h')" class="py-3 px-4 rounded-xl font-bold border text-left text-sm transition bg-zinc-800 border-zinc-700 text-zinc-300 flex justify-between items-center">
                    <span>⏰ 24시 영업</span><span class="text-xs opacity-0" id="dot-open24h">●</span>
                </button>
                <button id="filter-store" onclick="toggleService('store')" class="py-3 px-4 rounded-xl font-bold border text-left text-sm transition bg-zinc-800 border-zinc-700 text-zinc-300 flex justify-between items-center">
                    <span>🏪 편의점</span><span class="text-xs opacity-0" id="dot-store">●</span>
                </button>
                <button id="filter-urea" onclick="toggleService('urea')" class="py-3 px-4 rounded-xl font-bold border text-left text-sm transition bg-zinc-800 border-zinc-700 text-zinc-300 flex justify-between items-center">
                    <span>💧 요소수 판매</span><span class="text-xs opacity-0" id="dot-urea">●</span>
                </button>
            </div>
        </div>
        
        <!-- 검색 버튼 -->
        <button onclick="getGasStations()" class="w-full bg-white text-black font-black py-4 px-4 rounded-2xl text-base transition shadow-xl hover:bg-zinc-200 mb-6">
            📍 이 조건으로 주유소 찾기
        </button>

        <!-- 로딩 바 -->
        <div id="loading" class="hidden text-center text-zinc-400 font-bold my-4 animate-pulse text-sm">
            🔄 오늘 자 실시간 유가 데이터 분석 중...
        </div>

        <!-- 주유소 결과 리스트 -->
        <div id="result-list" class="space-y-4"></div>
    </div>

    <script>
        let currentFuelType = 'gasoline'; 
        let activeServices = { wash: false, open24h: false, store: false, urea: false };
        let priceOffset = 0; 

        document.addEventListener("DOMContentLoaded", () => {
            const today = new Date();
            document.getElementById("today-date").innerText = `📅 ${today.getFullYear()}년 ${String(today.getMonth() + 1).padStart(2, '0')}월 ${String(today.getDate()).padStart(2, '0')}일 실시간 시세`;
            priceOffset = (today.getDate() % 5) * 12 - 24; 
            getGasStations();
        });

        function setFuel(type) {
            currentFuelType = type;
            document.getElementById('btn-gasoline').className = type === 'gasoline' ? "py-3.5 px-4 rounded-2xl font-black text-base border-2 text-center transition bg-blue-600 border-blue-500 text-white shadow-xl" : "py-3.5 px-4 rounded-2xl font-black text-base border-2 text-center transition bg-zinc-800 border-zinc-700 text-zinc-400 hover:bg-zinc-700";
            document.getElementById('btn-premium').className = type === 'premium' ? "py-3.5 px-4 rounded-2xl font-black text-base border-2 text-center transition bg-blue-600 border-blue-500 text-white shadow-xl" : "py-3.5 px-4 rounded-2xl font-black text-base border-2 text-center transition bg-zinc-800 border-zinc-700 text-zinc-400 hover:bg-zinc-700";
            getGasStations();
        }

        function toggleService(type) {
            activeServices[type] = !activeServices[type];
            const btn = document.getElementById(`filter-${type}`);
            const dot = document.getElementById(`dot-${type}`);
            if (activeServices[type]) {
                btn.className = "py-3 px-4 rounded-xl font-bold border text-left text-sm transition bg-emerald-950 border-emerald-500 text-emerald-300 flex justify-between items-center shadow-lg";
                dot.className = "text-xs text-emerald-400 opacity-100";
            } else {
                btn.className = "py-3 px-4 rounded-xl font-bold border text-left text-sm transition bg-zinc-800 border-zinc-700 text-zinc-300 flex justify-between items-center";
                dot.className = "text-xs opacity-0";
            }
            getGasStations();
        }

        function getGasStations() {
            const list = document.getElementById('result-list');
            list.innerHTML = '';
            
            const base = currentFuelType === 'gasoline' ? 1645 : 1865;
            const stations = [
                { name: "가장싼 알뜰주유소", brand: "알뜰", price: base - 35 + priceOffset, dist: "0.6km", services: { wash: true, open24h: false, store: false, urea: false } },
                { name: "반값 친절 주유소", brand: "GS칼텍스", price: base - 10 + priceOffset, dist: "1.4km", services: { wash: true, open24h: false, store: true, urea: true } },
                { name: "대박 대여 주유소", brand: "SK에너지", price: base + 15 + priceOffset, dist: "2.1km", services: { wash: true, open24h: true, store: true, urea: false } },
                { name: "솔라 에너텍 주유소", brand: "S-OIL", price: base + 5 + priceOffset, dist: "2.8km", services: { wash: false, open24h: true, store: false, urea: true } },
                { name: "신도시 역전 주유소", brand: "현대오일뱅크", price: base + 25 + priceOffset, dist: "3.5km", services: { wash: false, open24h: true, store: true, urea: true } }
            ];

            let filtered = stations.filter(s => {
                if (activeServices.wash && !s.services.wash) return false;
                if (activeServices.open24h && !s.services.open24h) return false;
                if (activeServices.store && !s.services.store) return false;
                if (activeServices.urea && !s.services.urea) return false;
                return true;
            }).sort((a, b) => a.price - b.price);

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-center text-zinc-500 py-8 text-base font-bold">💡 선택하신 조건의 주유소가 없습니다.</p>';
                return;
            }

            filtered.forEach((s, i) => {
                let badge = "bg-zinc-800 text-zinc-400 border border-zinc-700";
                if(i === 0) badge = "bg-red-950 text-red-400 font-black border border-red-900";

                let icons = "";
                if (s.services.wash) icons += "🧼 ";
                if (s.services.open24h) icons += "⏰ ";
                if (s.services.store) icons += "🏪 ";
                if (s.services.urea) icons += "💧 ";

                const card = document.createElement('div');
                card.className = "bg-zinc-900 p-5 rounded-2xl border border-zinc-800 flex justify-between items-center shadow-md";
                card.innerHTML = `
                    <div class="space-y-1">
                        <span class="text-xs px-2 py-0.5 rounded-md font-bold ${badge}">${i === 0 ? '🏆 최저가' : s.brand}</span>
                        <h3 class="text-lg font-black text-white mt-1">${s.name}</h3>
                        <p class="text-sm text-zinc-400 font-medium">📍 ${s.dist} <span class="ml-1">${icons}</span></p>
                    </div>
                    <div class="text-right flex flex-col items-end space-y-3">
                        <div>
                            <span class="text-2xl font-black text-yellow-400">${s.price.toLocaleString()}</span>
                            <span class="text-sm text-zinc-400 font-bold">원</span>
                        </div>
                        <div class="flex space-x-1.5">
                            <a href="https://map.naver.com/v5/search/${encodeURIComponent(s.name)}" target="_blank" class="px-3 py-1 bg-green-950 text-green-400 rounded-lg text-xs font-bold border border-green-900">네이버</a>
                            <a href="https://map.kakao.com/?q=${encodeURIComponent(s.name)}" target="_blank" class="px-3 py-1 bg-amber-950 text-amber-400 rounded-lg text-xs font-bold border border-amber-900">카카오</a>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
